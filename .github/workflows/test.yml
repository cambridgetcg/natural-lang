name: test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python parser.py ../clear-standard/STATE.md | python -c "import json,sys; d=json.load(sys.stdin); assert d.get('name'); print(f'parser OK: {d[\"name\"]}')"
      - run: python -c "from parser import parse; from interpreter import execute; p=parse(open('README.md').read()); print(f'parse OK: {len(p.sections)} sections')"
